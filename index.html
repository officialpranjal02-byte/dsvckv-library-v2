<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSVCKV Library</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f4f4;
            overflow-x: hidden;
        }

        /* --- PAGE 1: HOME PAGE --- */
        .home-page {
            height: 100vh;
            width: 100vw;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=1920') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .home-page h1 {
            color: white;
            font-size: 3.5rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .tour-btn {
            background-color: #b31010;
            color: white;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .tour-btn:hover {
            background-color: #d61c1c;
            transform: scale(1.05);
        }

        /* --- PAGE 2: SUBJECT SELECTION --- */
        .subjects-page {
            display: none;
            min-height: 100vh;
            width: 100vw;
            background-color: #eaeaea;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .subjects-page h2 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 50px;
        }

        .card-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1200px;
        }

        .card {
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .anatomy-card { background: linear-gradient(135deg, #7f00ff, #e100ff); border-radius: 12px; }
        .physiology-card { background: linear-gradient(135deg, #ec53f4, #f39cf7); border-radius: 50px; }
        .lpm-card { background-color: #ff6600; border: 2px solid #002060; border-radius: 0px; }

        /* --- PAGE 3: BOOKSHELF PAGE --- */
        .bookshelf-page {
            display: none;
            min-height: 100vh;
            width: 100vw;
            background-color: #f0f0f0;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .bookshelf-page h2 {
            font-size: 2.2rem;
            color: #002060;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .shelf-container {
            width: 100%;
            max-width: 500px;
            background-color: #e3c193;
            border: 8px solid #b58953;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            padding: 10px;
        }

        .shelf-row {
            height: 130px;
            border-bottom: 12px solid #b58953;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 0 20px 5px 20px;
        }

        .shelf-row:last-child { border-bottom: none; }

        .shelf-row::before { font-size: 2.5rem; position: absolute; left: 20px; bottom: 5px; }
        .row-books::before { content: "📚"; }
        .row-notes::before { content: "📝"; }
        .row-manuals::before { content: "📑"; }
        .row-pyqs::before { content: "📜"; }

        .resource-btn {
            background-color: white;
            color: #002060;
            border: 2px solid #002060;
            padding: 8px 15px;
            font-size: 0.9rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 15px;
        }

        .resource-btn:hover { background-color: #002060; color: white; }

        /* --- PAGE 4: MANUAL UNITS --- */
        .unit-page {
            display: none;
            min-height: 100vh;
            width: 100vw;
            background-color: #eaeaea;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .unit-page h2 {
            font-size: 2.2rem;
            color: #7f00ff;
            margin-bottom: 40px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 600px;
            width: 100%;
        }

        .unit-btn {
            background: linear-gradient(135deg, #7f00ff, #e100ff);
            color: white;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            border: none;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .unit-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        /* --- PAGE 5: DYNAMIC BOOKS --- */
        .book-page {
            display: none;
            min-height: 100vh;
            width: 100vw;
            background-color: #eaeaea;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .book-page h2 {
            font-size: 2.2rem;
            color: #b31010;
            margin-bottom: 40px;
        }

        .book-list-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 600px;
            width: 100%;
        }

        .book-btn {
            background: linear-gradient(135deg, #b31010, #ff4d4d);
            color: white;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            border: none;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .book-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        /* --- PAGE 6: PYQ SELECTION --- */
        .pyq-page {
            display: none;
            min-height: 100vh;
            width: 100vw;
            background-color: #eaeaea;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .pyq-page h2 {
            font-size: 2.2rem;
            color: #002060;
            margin-bottom: 40px;
        }

        .pyq-list-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 600px;
            width: 100%;
        }

        .pyq-btn {
            background: linear-gradient(135deg, #002060, #2575fc);
            color: white;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            border: none;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .pyq-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        .back-btn {
            margin-top: 30px;
            background-color: #333;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .home-page h1 { font-size: 2.5rem; }
            .card-container { flex-direction: column; gap: 20px; }
            .grid-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="home-page" id="homePage">
        <h1>DSVCKV LIBRARY</h1>
        <button class="tour-btn" onclick="navigate('homePage', 'subjectsPage')">Take a Tour</button>
    </div>

    <div class="subjects-page" id="subjectsPage">
        <h2>Select Your Subject</h2>
        <div class="card-container">
            <div class="card anatomy-card" onclick="openShelf('Veterinary Anatomy')">Veterinary Anatomy</div>
            <div class="card physiology-card" onclick="openShelf('Veterinary Physiology')">Veterinary Physiology</div>
            <div class="card lpm-card" onclick="openShelf('Veterinary LPM')">LPM</div>
        </div>
        <button class="back-btn" onclick="navigate('subjectsPage', 'homePage')">← Back to Home</button>
    </div>

    <div class="bookshelf-page" id="bookshelfPage">
        <h2 id="currentSubjectTitle">Subject Name</h2>
        <div class="shelf-container">
            <div class="shelf-row row-books">
                <div></div>
                <button class="resource-btn" onclick="handleBookClick()">Books →</button>
            </div>
            <div class="shelf-row row-notes">
                <div></div>
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <a href="#" id="notesLink" target="_blank" class="resource-btn">KVASU Notes 📝 →</a>
                    <a href="#" id="kurreNotesLink" target="_blank" class="resource-btn" style="display: none;">Kurre Notes 📝 →</a>
                </div>
            </div>
            <div class="shelf-row row-manuals">
                <div></div>
                <button class="resource-btn" onclick="handleManualClick()">Manuals →</button>
            </div>
            <div class="shelf-row row-pyqs">
                <div></div>
                <button class="resource-btn" onclick="handlePyqClick()">PYQs 📜 →</button>
            </div>
        </div>
        <button class="back-btn" onclick="navigate('bookshelfPage', 'subjectsPage')">← Back to Subjects</button>
    </div>

    <div class="unit-page" id="unitPage">
        <h2>Veterinary Anatomy Manuals</h2>
        <div class="grid-container">
            <a href="#" id="unit1" target="_blank" class="unit-btn">Unit 1</a>
            <a href="#" id="unit2" target="_blank" class="unit-btn">Unit 2 (Forelimb)</a>
            <a href="#" id="unit3" target="_blank" class="unit-btn">Unit 3</a>
            <a href="#" id="unit4" target="_blank" class="unit-btn">Unit 4</a>
            <a href="#" id="unit5" target="_blank" class="unit-btn">Unit 5</a>
            <a href="#" id="unit6" target="_blank" class="unit-btn">Unit 6</a>
            <a href="#" id="unit7" target="_blank" class="unit-btn">Unit 7</a>
            <a href="#" id="unit8" target="_blank" class="unit-btn">Unit 8</a>
        </div>
        <button class="back-btn" onclick="navigate('unitPage', 'bookshelfPage')">← Back to Shelf</button>
    </div>

    <div class="book-page" id="bookPage">
        <h2 id="bookPageTitle">Veterinary Books</h2>
        <div class="book-list-container" id="bookListContainer"></div>
        <button class="back-btn" onclick="navigate('bookPage', 'bookshelfPage')">← Back to Shelf</button>
    </div>

    <div class="pyq-page" id="pyqPage">
        <h2 id="pyqPageTitle">Previous Year Papers</h2>
        <div class="pyq-list-container" id="pyqListContainer"></div>
        <button class="back-btn" onclick="handlePyqBackClick()">← Back to Shelf</button>
    </div>

    <script>
        var selectedSubject = '';
        var currentPyqViewState = 'main'; 

        function navigate(hideId, showId) {
            var hideEl = document.getElementById(hideId);
            var showEl = document.getElementById(showId);
            if (hideEl && showEl) {
                hideEl.style.display = 'none';
                showEl.style.display = 'flex';
                window.scrollTo(0, 0); 
            }
        }

        var driveLinks = {
            'Veterinary Anatomy': { notes: '#', kurre: '#' },
            'Veterinary Physiology': { 
                notes: 'https://drive.google.com/file/d/1JZzRsCM3QiGRoWro8-lPjEzITXPoPnZr/view?usp=drivesdk', 
                kurre: 'https://drive.google.com/file/d/1b0pky4bGWBH00aouV_a6JJ1B20Scq6Fl/view?usp=drivesdk' 
            },
            'Veterinary LPM': { notes: '#', kurre: '#' }
        };

        var pyqLinks = {
            'Veterinary Anatomy': { 
                external1: '#', external2: '#', 
                internal1: '#', internal2: '#', internal3: '#' 
            },
            'Veterinary Physiology': { 
                external1: '#', external2: '#', 
                internal1: '#', internal2: '#', internal3: '#' 
            },
            'Veterinary LPM': { 
                external1: '#', external2: '#', 
                internal1: '#', internal2: '#', 
                internal3: 'https://drive.google.com/file/d/1-yqhl0-4HWMhovT9mSbY5V_gmM_MYzXE/view?usp=drivesdk' 
            }
        };

        var anatomyBooks = [
            { text: 'R.K. Ghosh - Gross Anatomy 📖', url: 'https://drive.google.com/file/d/1g0yDNIsS4FF8tRA7emRokP0qwg2oZJSJ/view?usp=drivesdk' },
            { text: 'R.K. Ghosh - Embryology & Histology 🔬', url: 'https://drive.google.com/file/d/1T45uZs9At9O1CABvYFQdH-fyhssWYP8u/view?usp=drivesdk' }
        ];

        var lpmBooks = [
            { text: 'Thomas & NSR Shastry 🐄', url: 'https://drive.google.com/file/d/1eQaP0If3NGlmNMe5m1__gKAggMd28y1W/view?usp=drivesdk' },
            { text: 'Handbook on Wild and Zoo Animals 🐆', url: 'https://drive.google.com/file/d/1OjQkpp565T4lJ6SXzltlvSgSIUlwigNa/view?usp=drivesdk' }
        ];

        var physioBooks = [
            { text: "Duke's Physiology of Domestic Animals 🐎", url: 'https://drive.google.com/file/d/15pYi4cLAgHAl1C1rhQkNiuiMaQYLuhwB/view?usp=drivesdk' }
        ];

        var anatomyManuals = {
            unit1: 'https://drive.google.com/file/d/1NsccZk_EZkEX1OjWVXXTv6cyXMW1IC_n/view?usp=drivesdk',
            unit2: 'https://drive.google.com/file/d/1aSOmRjLGJ3kOlRJBK8OFmMBpqC0QC3t8/view?usp=drivesdk',
            unit3: 'https://drive.google.com/file/d/1sx_p-ZRctXq81XS57jP41q7hiDB94YAS/view?usp=drivesdk',
            unit4: 'https://drive.google.com/file/d/1vKnXdkMsKvvQwzHa4QhhRi1DwobkGnTs/view?usp=drivesdk',
            unit5: 'https://drive.google.com/file/d/10Xcc2sHKatvNlWN4dnb54_Takf6mRTDA/view?usp=drivesdk',
            unit6: 'https://drive.google.com/file/d/18l3iAMFcdfE9jNWNKR0lLUJziMegxvEN/view?usp=drivesdk',
            unit7: 'https://drive.google.com/file/d/1lK7XltxKYNYMvePQiRaIUDt-y5ZhoHe7/view?usp=drivesdk',
            unit8: 'https://drive.google.com/file/d/1gt9hK5xIQDo3ycz4JSVxoD_SxdZ0AfQJ/view?usp=drivesdk'
        };

        function openShelf(subjectName) {
            selectedSubject = subjectName;
            document.getElementById('currentSubjectTitle').innerText = subjectName;
            
            var notesBtn = document.getElementById('notesLink');
            notesBtn.href = driveLinks[subjectName].notes || '#';
            
            var kurreBtn = document.getElementById('kurreNotesLink');
            
            if (subjectName === 'Veterinary Physiology') {
                notesBtn.innerText = "KVASU Notes 📝 →";
                kurreBtn.href = driveLinks[subjectName].kurre;
                kurreBtn.style.display = 'inline-block';
            } else {
                notesBtn.innerText = "Notes →";
                kurreBtn.style.display = 'none';
            }
            
            navigate('subjectsPage', 'bookshelfPage');
        }

        function handleBookClick() {
            var container = document.getElementById('bookListContainer');
            container.innerHTML = ''; 
            if (selectedSubject === 'Veterinary Anatomy') {
                document.getElementById('bookPageTitle').innerText = 'Veterinary Anatomy Books';
                renderBookButtons(anatomyBooks);
            } else if (selectedSubject === 'Veterinary LPM') {
                document.getElementById('bookPageTitle').innerText = 'Veterinary LPM Books';
                renderBookButtons(lpmBooks);
            } else if (selectedSubject === 'Veterinary Physiology') {
                document.getElementById('bookPageTitle').innerText = 'Veterinary Physiology Books';
                renderBookButtons(physioBooks);
            }
            navigate('bookshelfPage', 'bookPage');
        }

        function renderBookButtons(booksArray) {
            var container = document.getElementById('bookListContainer');
            booksArray.forEach(function(book) {
                var btn = document.createElement('a');
                btn.href = book.url;
                btn.target = '_blank';
                btn.className = 'book-btn';
                btn.innerText = book.text;
                container.appendChild(btn);
            });
        }

        function handleManualClick() {
            if (selectedSubject === 'Veterinary Anatomy') {
                for (var i = 1; i <= 8; i++) {
                    document.getElementById('unit' + i).href = anatomyManuals['unit' + i];
                }
                navigate('bookshelfPage', 'unitPage');
            } else {
                window.open(driveLinks[selectedSubject].manual || '#', '_blank');
            }
        }

        function handlePyqClick() {
            currentPyqViewState = 'main';
            document.getElementById('pyqPageTitle').innerText = selectedSubject + ' PYQs';
            showPyqMainMenu();
            navigate('bookshelfPage', 'pyqPage');
        }

        function showPyqMainMenu() {
            var container = document.getElementById('pyqListContainer');
            container.innerHTML = '';

            var internalBtn = document.createElement('button');
            internalBtn.className = 'pyq-btn';
            internalBtn.innerText = 'Internal Exams 📝';
            internalBtn.onclick = function() { showInternalMenu(); };

            var externalBtn = document.createElement('button');
            externalBtn.className = 'pyq-btn';
            externalBtn.innerText = 'External (Annual) Exams 📜';
            externalBtn.onclick = function() { showExternalMenu(); };

            container.appendChild(internalBtn);
            container.appendChild(externalBtn);
        }

        function showInternalMenu() {
            currentPyqViewState = 'internal';
            document.getElementById('pyqPageTitle').innerText = selectedSubject + ' Internal Exams';
            var container = document.getElementById('pyqListContainer');
            container.innerHTML = '';

            var internals = [
                { text: 'First Internal Exam ✏️', url: pyqLinks[selectedSubject].internal1 },
